[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
# OpenZeppelin ships a formal-verification harness folder (fv/) that references patched
# sources not present in the published package; skip it so it never enters the build.
skip = ["lib/openzeppelin-contracts/fv/**", "lib/openzeppelin-contracts/certora/**"]

[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
base_mainnet = "https://mainnet.base.org"
optimism_sepolia = "https://sepolia.optimism.io"
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
arc_testnet = "https://rpc.testnet.arc.network"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }

[fmt]
line_length = 120
